<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Orange rounded square background -->
  <rect width="100" height="100" rx="22" fill="#E8781A"/>

  <!-- Chef hat: brim/band at bottom -->
  <rect x="30" y="72" width="40" height="11" rx="4" fill="white"/>

  <!-- Chef hat: stem connecting puff to brim -->
  <rect x="38" y="58" width="24" height="18" fill="white"/>

  <!-- Chef hat: left puff -->
  <circle cx="36" cy="50" r="16" fill="white"/>

  <!-- Chef hat: right puff -->
  <circle cx="64" cy="50" r="16" fill="white"/>

  <!-- Chef hat: center puff (taller) -->
  <circle cx="50" cy="43" r="18" fill="white"/>

  <!-- Fill the bottom gap between puffs and stem -->
  <rect x="22" y="52" width="56" height="12" fill="white"/>
</svg>
